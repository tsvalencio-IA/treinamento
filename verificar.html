<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Verificação do Treinamento</title><style>body{font:16px system-ui;background:#eef1f5;padding:24px;color:#172033}.box{max-width:900px;margin:auto;background:#fff;padding:24px;border-radius:18px}.ok{color:#087443}.bad{color:#b42318}li{margin:9px 0}</style></head><body><div class="box"><h1>Verificação do Treinamento Final</h1><ol id="checks"></ol><h2 id="result">Verificando...</h2><p>Esta página verifica arquivos, responsividade, dados locais e estrutura do roteiro.</p></div><script type="module">
const checks=[
["Página principal",()=>fetch("./index.html").then(r=>r.ok)],
["CSS responsivo",()=>fetch("./css/treinamento.css").then(r=>r.text()).then(t=>t.includes("@media(max-width:680px)")&&t.includes("orientation:landscape"))],
["Roteiro prático",()=>fetch("./js/dados.js").then(r=>r.text()).then(t=>t.includes("Produção aprovada e produção pronta")&&t.includes("Estornos na ordem correta"))],
["Motor do treinamento",()=>fetch("./js/treinamento.js").then(r=>r.text()).then(t=>t.includes("__GLAMORE_TRAINING_SELFTEST__")&&t.includes("data-training-id"))],
["Perguntas verificadas",()=>fetch("./js/dados.js").then(r=>r.text()).then(t=>t.includes("Corrigir status do PDF")&&t.includes("Quantidade e peso são independentes"))],
["Sem Firebase oficial",()=>Promise.all([fetch("./js/treinamento.js").then(r=>r.text()),fetch("./js/dados.js").then(r=>r.text())]).then(([a,b])=>!a.includes("firebaseio.com")&&!b.includes("firebaseio.com")&&!a.includes("apiKey"))],
["GitHub Pages",()=>fetch("./.nojekyll").then(r=>r.ok)],
["Manifesto",()=>fetch("./MANIFESTO-INTEGRIDADE.json").then(r=>r.json()).then(j=>j.firebase_oficial===false&&j.repositorio_oficial_modificado===false)]
];
let ok=0;for(const [name,fn] of checks){let pass=false;try{pass=await fn()}catch{};if(pass)ok++;document.querySelector("#checks").insertAdjacentHTML("beforeend",`<li class="${pass?"ok":"bad"}">${pass?"✓":"✗"} ${name}</li>`)}document.querySelector("#result").textContent=ok===checks.length?`APROVADO — ${ok}/${checks.length}`:`REPROVADO — ${ok}/${checks.length}`;
</script></body></html>
